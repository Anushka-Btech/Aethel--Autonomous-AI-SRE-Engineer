services:
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    ports:
      - "7475:7474" # Neo4j Browser (http://localhost:7474)
      - "7688:7687" # Bolt protocol (used by the app)
    environment:
      - NEO4J_AUTH=neo4j/sentinel-demo
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - sentinel_neo4j_data:/data

volumes:
  sentinel_neo4j_data:
